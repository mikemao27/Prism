<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prism — Sign In</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="auth-logo-mark">◈</div>
        <span class="auth-logo-name">Prism</span>
      </div>

      <div id="error-msg" class="error-msg"></div>

      <!-- Login Form -->
      <div id="login-view">
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign In to Continue to Prism</p>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input
            id="login-email"
            type="email"
            class="form-input"
            placeholder="you@example.com"
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input
            id="login-password"
            type="password"
            class="form-input"
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </div>

        <button class="btn-primary" id="login-btn">Sign In</button>

        <p class="auth-switch">
          Don't Have an Account?
          <a href="#" id="go-register">Create One</a>
        </p>
      </div>

      <!-- Register Form -->
      <div id="register-view" style="display: none;">
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Start Routing Smarter with Prism</p>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input
            id="register-email"
            type="email"
            class="form-input"
            placeholder="you@example.com"
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input
            id="register-password"
            type="password"
            class="form-input"
            placeholder="••••••••"
            autocomplete="new-password"
          />
        </div>

        <button class="btn-primary" id="register-btn">Create Account</button>

        <p class="auth-switch">
          Already Have an Account?
          <a href="#" id="go-login">Sign In</a>
        </p>
      </div>

    </div>
  </div>

  <script src="/static/js/auth.js"></script>
</body>
</html>
